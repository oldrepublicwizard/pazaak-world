# Nakama config for cloud / single-binary deploy.
# database.address is overridden at runtime via --database.address (see docker-entrypoint.cloud.sh).
name: pazaakworld-nakama
logger:
  level: INFO
database:
  address:
    # Placeholder only; entrypoint passes --database.address (Heroic Labs: CLI overrides YAML).
    - "nakama:override@127.0.0.1:5432/nakama?sslmode=disable"
runtime:
  path: /nakama/data/modules
  js_entrypoint: pazaak-world.js
session:
  token_expiry_sec: 7200
socket:
  server_key: defaultkey
console:
  port: 7351
metrics:
  prometheus_port: 9100
