name: Deploy PazaakWorld to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/pazaak-world/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-pazaakworld.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pazaak-world-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace libraries
        run: |
          pnpm --filter @pazaak/platform build
          pnpm --filter @pazaak/modsync-tokens build
          pnpm --filter @pazaak/blackjack-engine build
          pnpm --filter @pazaak/pazaak-engine build

      - name: Build PazaakWorld
        env:
          BASE: /pazaak-world/
          VITE_API_BASES: ${{ vars.PAZAAK_API_BASES }}
          VITE_REPO_BASE_URL: https://github.com/${{ github.repository }}
          VITE_PAZAAK_DISCORD_APPLICATION_ID: ${{ vars.PAZAAK_DISCORD_APP_ID }}
          VITE_PAZAAK_BACKEND: ${{ vars.VITE_PAZAAK_BACKEND }}
          VITE_NAKAMA_HOST: ${{ vars.VITE_NAKAMA_HOST }}
          VITE_NAKAMA_PORT: ${{ vars.VITE_NAKAMA_PORT }}
          VITE_NAKAMA_USE_SSL: ${{ vars.VITE_NAKAMA_USE_SSL }}
          VITE_NAKAMA_SERVER_KEY: ${{ vars.VITE_NAKAMA_SERVER_KEY }}
        run: pnpm --filter pazaak-world build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/pazaak-world/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
