name: Deploy PazaakWorld to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/pazaak-world/**"
      - "apps/hk86-web/**"
      - "apps/holocron-web/**"
      - "apps/trask-http-server/**"
      - "packages/**"
      - "vendor/**"
      - "wiki/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".gitmodules"
      - ".github/workflows/deploy-pazaakworld.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pazaak-world-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      base_path: ${{ steps.base.outputs.base_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          # Default GITHUB_TOKEN for same-repo PRs. Do not pass ACTIONS_SUBMODULES_TOKEN when
          # the secret is stale — it overrides the default token and breaks submodule checkout.

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Resolve Pages base path
        id: base
        shell: bash
        run: |
          echo "base_path=/community-bots/" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace libraries (dist for workspace:* deps)
        run: |
          pnpm --filter @openkotor/platform build
          pnpm --filter @openkotor/blackjack-engine build
          pnpm --filter @openkotor/pazaak-engine build

      - name: Build PazaakWorld
        env:
          BASE: ${{ steps.base.outputs.base_path }}
          # Use workflow vars (not `gh variable get` + GITHUB_TOKEN — that often returns empty).
          VITE_API_BASES: ${{ vars.PAZAAK_API_BASES }}
          # Optional: prepended before VITE_API_BASES so embedded bot (OAuth/Trask) is primary and PAZAAK_API_BASES can list Worker fallbacks.
          VITE_LEGACY_HTTP_ORIGIN: ${{ vars.VITE_LEGACY_HTTP_ORIGIN }}
          VITE_REPO_BASE_URL: https://github.com/${{ github.repository }}
          VITE_WIKI_BASE_URL: ${{ vars.WIKI_BASE_URL }}
          VITE_TRASK_DISCORD_APPLICATION_ID: ${{ vars.TRASK_DISCORD_APP_ID }}
          VITE_HK_DISCORD_APPLICATION_ID: ${{ vars.HK86_DISCORD_APP_ID }}
          VITE_DISCORD_APPLICATION_ID: ${{ vars.HK86_DISCORD_APP_ID }}
          VITE_PAZAAK_DISCORD_APPLICATION_ID: ${{ vars.PAZAAK_DISCORD_APP_ID }}
          # Optional: point the static Pages bundle at a hosted Nakama (see docs/nakama-cloud-hosting.md).
          VITE_PAZAAK_BACKEND: ${{ vars.VITE_PAZAAK_BACKEND }}
          VITE_NAKAMA_HOST: ${{ vars.VITE_NAKAMA_HOST }}
          VITE_NAKAMA_PORT: ${{ vars.VITE_NAKAMA_PORT }}
          VITE_NAKAMA_USE_SSL: ${{ vars.VITE_NAKAMA_USE_SSL }}
          VITE_NAKAMA_SERVER_KEY: ${{ vars.VITE_NAKAMA_SERVER_KEY }}
        run: pnpm --filter pazaak-world build

      - name: Check Holocron API base
        if: hashFiles('apps/holocron-web/package.json') != ''
        env:
          TRASK_API_BASE: ${{ vars.TRASK_API_BASE }}
        run: |
          if [ -z "$TRASK_API_BASE" ]; then
            echo "::error::Set repository variable TRASK_API_BASE to the deployed Trask API origin before publishing Holocron."
            exit 1
          fi

      - name: Build Holocron web (Trask Q&A SPA)
        if: hashFiles('apps/holocron-web/package.json') != ''
        env:
          BASE: /community-bots/qa-webui/
          ENABLE_SPARK: "0"
          VITE_TRASK_API_BASE: ${{ vars.TRASK_API_BASE }}
        run: pnpm --filter @openkotor/holocron-web build

      - name: Publish Holocron web under /community-bots/qa-webui/
        if: hashFiles('apps/holocron-web/package.json') != ''
        run: |
          mkdir -p apps/pazaak-world/dist/qa-webui
          cp -R apps/holocron-web/dist/. apps/pazaak-world/dist/qa-webui/

      - name: Build Discord bots hub WebUI (hk86)
        env:
          BASE: /community-bots/hk86/
          VITE_REPO_BASE_URL: https://github.com/${{ github.repository }}
          VITE_WIKI_BASE_URL: ${{ vars.WIKI_BASE_URL }}
          VITE_TRASK_DISCORD_APPLICATION_ID: ${{ vars.TRASK_DISCORD_APP_ID }}
          VITE_HK_DISCORD_APPLICATION_ID: ${{ vars.HK86_DISCORD_APP_ID }}
          VITE_DISCORD_APPLICATION_ID: ${{ vars.HK86_DISCORD_APP_ID }}
          VITE_PAZAAK_DISCORD_APPLICATION_ID: ${{ vars.PAZAAK_DISCORD_APP_ID }}
        run: pnpm --filter hk86-web build

      - name: Publish HK-86 WebUI under /community-bots/hk86/
        run: |
          mkdir -p apps/pazaak-world/dist/hk86
          cp -R apps/hk86-web/dist/. apps/pazaak-world/dist/hk86/

      - name: Add SPA fallback
        run: cp apps/pazaak-world/dist/index.html apps/pazaak-world/dist/404.html

      # GitHub Pages returns 404 for unknown paths even when 404.html is the SPA shell.
      # Duplicate the SPA shell so /community-bots/discord and /community-bots/pazaakworld
      # resolve to real files (HTTP 200) for crawlers, curl, and strict clients.
      - name: Materialize SPA routes for static hosting
        shell: bash
        run: |
          set -euo pipefail
          root="apps/pazaak-world/dist"
          routes=(
            discord
            pazaakworld
            pazaakworld/onboarding
            pazaakworld/matchmaking
            pazaakworld/lobby
            pazaakworld/practice
            pazaakworld/blackjack
            pazaakworld/workshop
            pazaakworld/trask
            pazaakworld/tournaments
          )
          for sub in "${routes[@]}"; do
            mkdir -p "$root/$sub"
            cp "$root/index.html" "$root/$sub/index.html"
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/pazaak-world/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
