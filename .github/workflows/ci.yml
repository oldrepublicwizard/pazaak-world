name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build + engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages + bot
        run: |
          pnpm --filter @pazaak/pazaak-engine build
          pnpm --filter @pazaak/pazaak-policy build
          pnpm --filter @pazaak/pazaak-rating build
          pnpm --filter @pazaak/blackjack-engine build
          pnpm --filter @pazaak/config build
          pnpm --filter @pazaak/core build
          pnpm --filter @pazaak/discord-ui build
          pnpm --filter @pazaak/persistence build
          pnpm --filter @pazaak/personas build
          pnpm --filter @pazaak/platform build
          pnpm --filter @pazaak/pazaak-tournament build
          pnpm --filter @pazaak/pazaak-bot build

      - name: Engine unit tests
        run: node --test packages/pazaak-engine/dist/*.test.js

      - name: Trask coupling gate
        run: |
          if rg -i 'createTraskHttpRouter|/api/trask|TraskScreen' apps packages --glob '!**/node_modules/**' --glob '!**/dist/**'; then
            echo "Trask coupling must stay removed" >&2
            exit 1
          fi
          echo "Trask gate OK"
