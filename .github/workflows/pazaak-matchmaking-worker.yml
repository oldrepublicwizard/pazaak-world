name: Deploy Pazaak Matchmaking Worker

on:
  push:
    branches:
      - main
    paths:
      - "infra/pazaak-matchmaking-worker/**"
      - "packages/pazaak-engine/**"
      - "packages/pazaak-policy/**"
      - "packages/pazaak-tournament/**"
      - "packages/platform/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/pazaak-matchmaking-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pazaak-matchmaking-worker
  cancel-in-progress: true

jobs:
  verify-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Install workspace (worker bundle resolves workspace packages)
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages (wrangler resolves compiled dist/* entrypoints)
        run: |
          pnpm --filter @openkotor/platform build
          pnpm --filter @openkotor/pazaak-engine build
          pnpm --filter @openkotor/pazaak-policy build
          pnpm --filter @openkotor/pazaak-tournament build

      - name: Wrangler dry-run (no Cloudflare secrets required)
        run: pnpm dlx wrangler@4.87.0 deploy --config infra/pazaak-matchmaking-worker/wrangler.toml --dry-run

  deploy:
    needs: verify-bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check Cloudflare secrets
        id: cf_check
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare secrets not configured – skipping worker deploy. Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets to enable."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Checkout
        if: steps.cf_check.outputs.configured == 'true'
        uses: actions/checkout@v6

      - name: Setup Node
        if: steps.cf_check.outputs.configured == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        if: steps.cf_check.outputs.configured == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Install workspace (worker bundle resolves workspace packages)
        if: steps.cf_check.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages (wrangler resolves compiled dist/* entrypoints)
        if: steps.cf_check.outputs.configured == 'true'
        run: |
          pnpm --filter @openkotor/platform build
          pnpm --filter @openkotor/pazaak-engine build
          pnpm --filter @openkotor/pazaak-policy build
          pnpm --filter @openkotor/pazaak-tournament build

      - name: Deploy worker
        if: steps.cf_check.outputs.configured == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm dlx wrangler@4.87.0 deploy --config infra/pazaak-matchmaking-worker/wrangler.toml

      # Optional: set repository secrets WORKER_* (see infra/pazaak-matchmaking-worker/README.md) so
      # GET /api/auth/oauth/providers returns enabled: true. Provider consoles must allow callbacks on
      # https://<worker-host>/api/auth/oauth/<provider>/callback (not the static Pages URL).
      - name: Sync OAuth secrets to Cloudflare Worker
        if: steps.cf_check.outputs.configured == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DISCORD_CLIENT_ID: ${{ secrets.WORKER_DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.WORKER_DISCORD_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.WORKER_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.WORKER_GOOGLE_CLIENT_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.WORKER_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.WORKER_GITHUB_CLIENT_SECRET }}
        run: |
          set -eo pipefail
          wr () { pnpm dlx wrangler@4.87.0 "$@"; }
          put () {
            name="$1"
            val="${2-}"
            if [ -z "${val}" ]; then
              return 0
            fi
            printf '%s' "$val" | wr secret put "$name" --config infra/pazaak-matchmaking-worker/wrangler.toml
          }
          put DISCORD_CLIENT_ID "${DISCORD_CLIENT_ID-}"
          put DISCORD_CLIENT_SECRET "${DISCORD_CLIENT_SECRET-}"
          put GOOGLE_CLIENT_ID "${GOOGLE_CLIENT_ID-}"
          put GOOGLE_CLIENT_SECRET "${GOOGLE_CLIENT_SECRET-}"
          put GITHUB_CLIENT_ID "${GITHUB_CLIENT_ID-}"
          put GITHUB_CLIENT_SECRET "${GITHUB_CLIENT_SECRET-}"
